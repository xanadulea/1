A ∪ B = unija (vse v A ali B)
A ∩ B = presek (skupni elementi)
A \\ B = razlika (v A, ni pa v B)
A^c = komplement (vse razen A)

(A ∪ B)^c = A^c ∩ B^c
(A ∩ B)^c = A^c ∪ B^c

Relacija R na A je podmnožica A×A.

            exercises: [
                { q: 'Taylorjev polinom 3. stopnje za eˣ okoli 0?', correct: '1 + x + x²/2! + x³/3!', answer_display: '1 + x + x²/2 + x³/6', steps: 'f(0)=1, f'(0)=1, f''(0)=1, f'''(0)=1.' },
                { q: 'Prvi dva člena razvoja sin x okoli 0?', correct: 'x - x³/6', answer_display: 'x - x³/6', steps: 'sin x = x − x³/3! + ...' }
            ],
            quiz: [
                { q: 'Taylorjev polinom 1. stopnje za f(x) okoli a je:', options: ['f(a)', 'f(a)+f\'(a)(x-a)', 'f\'(a)'], correct: 1 },
                { q: 'Razvoj eˣ okoli 0 začne z:', options: ['1 + x', 'x + x²', '1'], correct: 0 }
            ],
            ustna: [
                { q: 'Kaj je Taylorjev polinom?', a: 'Polinom, ki v neki točki aproksimira funkcijo in se z njo ujema v odvodih.' },
                { q: 'Kaj je ostanek pri Taylorju?', a: 'Napaka, ko funkcijo aproksimiramo s polinomom.' }
            ],
            notes: 'Tₙ(x) = ∑ f⁽ᵏ⁾(a)/k! (x−a)ᵏ. Razvoji: eˣ, sin x, cos x, ln(1+x), arctan x.'
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const topicId = urlParams.get('id');
    const topic = topicsData[topicId];

    if (!topic) {
        document.getElementById('content').innerHTML = '<p>Tema ne obstaja.</p>';
    } else {
        let completedTopics = JSON.parse(localStorage.getItem('math_completedTopics') || '[]');
        let isCompleted = completedTopics.includes(topicId);
        let quizPassed = false;

        function saveCompletion() {
            if (!completedTopics.includes(topicId)) {
                completedTopics.push(topicId);
                localStorage.setItem('math_completedTopics', JSON.stringify(completedTopics));
                isCompleted = true;
                const btn = document.getElementById('completeBtn');
                if (btn) btn.disabled = true;
                alert(`🎉 Opravili ste temo ${topic.name}!`);
            }
        }

        function render() {
            let exercisesHtml = '';
            topic.exercises.forEach((ex, idx) => {
                exercisesHtml += `
                    <div class="exercise">
                        <p><strong>${idx+1}.</strong> ${ex.q}</p>
                        <input type="text" class="answer-input" id="input-${idx}" placeholder="Vpiši odgovor...">
                        <button onclick="checkAnswer(${idx})">Preveri</button>
                        <div class="feedback" id="feedback-${idx}"></div>
                        <div class="step-solution" id="steps-${idx}"></div>
                    </div>
                `;
            });

            let quizHtml = '';
            topic.quiz.forEach((q, idx) => {
                quizHtml += `
                    <div class="quiz-question">
                        <p><strong>${idx+1}.</strong> ${q.q}</p>
                `;
                q.options.forEach((opt, optIdx) => {
                    quizHtml += `<label class="quiz-option"><input type="radio" name="quiz_${idx}" value="${optIdx}"> ${opt}</label>`;
                });
                quizHtml += `</div>`;
            });

            let ustnaHtml = '';
            topic.ustna.forEach((q, idx) => {
                ustnaHtml += `
                    <div class="ustna">
                        <p><strong>${idx+1}.</strong> ${q.q}</p>
                        <button class="ustna-btn" onclick="toggleUstna(${idx})">🔍 Pokaži odgovor</button>
                        <div class="ustna-odgovor" id="ustna-${idx}">${q.a}</div>
                    </div>
                `;
            });

            const content = document.getElementById('content');
            content.innerHTML = `
                <h1>${topic.name}</h1>
                <div class="theory">${topic.theory}</div>
                <h2>📝 Vaje</h2>
                ${exercisesHtml}
                <h2>📊 Kviz</h2>
                ${quizHtml}
                <button onclick="submitQuiz()">Oddaj kviz</button>
                <div id="quiz-result"></div>
                <h2>🎤 Ustni izpit – vprašanja</h2>
                ${ustnaHtml}
                ${!isCompleted ? `<button class="complete-btn" id="completeBtn" onclick="completeTopic()" disabled>🔒 Najprej opravi kviz</button>` : `<button class="complete-btn" disabled>✅ Tema opravljena</button>`}
                <div class="notes"><strong>📝 Zapiski za papir:</strong><br>${topic.notes}</div>
            `;
        }

        window.checkAnswer = function(idx) {
            const input = document.getElementById(`input-${idx}`);
            const answer = input.value.trim().toLowerCase();
            const ex = topic.exercises[idx];
            const correct = ex.correct.toLowerCase();
            const isCorrect = answer === correct || correct.includes(answer) || answer.includes(correct);
            const fb = document.getElementById(`feedback-${idx}`);
            const stepsDiv = document.getElementById(`steps-${idx}`);
            fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
            fb.innerHTML = isCorrect ? '✅ Pravilno!' : `❌ Napačno. Pravilen odgovor: ${ex.answer_display}`;
            if (!isCorrect) {
                stepsDiv.innerHTML = `<strong>📖 Pravilen postopek:</strong><br>${ex.steps}`;
                stepsDiv.style.display = 'block';
            } else stepsDiv.style.display = 'none';
            fb.style.display = 'block';
        };

        window.toggleUstna = function(idx) {
            const div = document.getElementById(`ustna-${idx}`);
            div.style.display = div.style.display === 'block' ? 'none' : 'block';
        };

        window.submitQuiz = function() {
            let score = 0;
            for (let i = 0; i < topic.quiz.length; i++) {
                const selected = document.querySelector(`input[name="quiz_${i}"]:checked`);
                if (selected && parseInt(selected.value) === topic.quiz[i].correct) score++;
            }
            const total = topic.quiz.length;
            const passed = score >= total - 1;
            const resultDiv = document.getElementById('quiz-result');
            if (passed) {
                resultDiv.innerHTML = `<div class="message" style="background:#d4edda;">✅ Rezultat: ${score}/${total} – Kviz opravljen! Sedaj lahko zakleneš temo.</div>`;
                document.getElementById('completeBtn').disabled = false;
                quizPassed = true;
            } else {
                resultDiv.innerHTML = `<div class="message" style="background:#f8d7da;">❌ Rezultat: ${score}/${total} – Potrebuješ vsaj ${total-1}/${total}. Poskusi znova.</div>`;
            }
        };

        window.completeTopic = function() {
            if (!quizPassed && !isCompleted) {
                alert('Najprej moraš uspešno opraviti kviz!');
                return;
            }
            if (!isCompleted) saveCompletion();
        };

        render();
    }
</script>
</body>
</html>
