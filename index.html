<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Študijski portal</title>
    <style>
        body {
            font-family: 'Georgia', 'Times New Roman', Times, serif;
            background: #f0f0eb;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #0a2f1f;
            text-align: center;
            margin-bottom: 2rem;
        }
        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
        }
        .subject-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            cursor: pointer;
            text-align: center;
            border: 2px solid #ddd;
            transition: 0.2s;
        }
        .subject-card:hover {
            border-color: #0a2f1f;
            transform: scale(1.02);
        }
        .subject-card h2 {
            color: #0a2f1f;
            margin-bottom: 0.5rem;
        }
        .subject-card p {
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📚 Študijski portal</h1>
    <div class="subjects-grid">
        <div class="subject-card" onclick="location.href='matematika.html'">
            <h2>📐 Matematika 1</h2>
            <p>Množice, logika, števila, zaporedja, vrste, funkcije, odvodi, integrali, Taylor</p>
        </div>
        <!-- Dodaj več predmetov kasneje -->
        <!-- <div class="subject-card" onclick="location.href='fizika.html'">⚡ Fizika</div> -->
    </div>
</div>
</body>
</html>
